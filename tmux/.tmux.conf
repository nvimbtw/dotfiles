# Global Settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # True color
set -s escape-time 0  # No ESC delay
set -g history-limit 50000
set -g focus-events on
set -g renumber-windows on  # Renumber windows on close
set -g base-index 1  # Start at 1
setw -g pane-base-index 1
set -g mouse on  # Mouse for scrolling/resizing
set -g status-position bottom
set -g status-interval 1  # Update every second

set-environment -g PATH "$HOME/.nix-profile/bin:$PATH"

set -g prefix C-Space
unbind C-a
bind C-Space send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"  # New window

# Vim-style navigation & resize
setw -g mode-keys vi
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Copy mode (vi)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind p paste-buffer

# Status Bar Styling (Clean, dark theme with blue accents - adapt hex colors)
set -g status-style fg=#d8dee9,bg=default # Light text, dark bg
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 60
set -g status-right-style fg=#88c0d0,bg=default  # Blue accents on right

# Window status (tab-like: numbered, active highlighted)
set -g window-status-current-format "#[fg=#b4befe,bg=default,bold] #I "
set -g window-status-format "#[fg=#313244,bg=default,bold] #I "
set -g window-status-separator ""

set -g status-left "#[fg=#89b4fa,bg=#1e1e2e,bold] #{session_name} 󰇝 #{pane_current_command} #[fg=#1e1e2e,bg=default] "

set -g status-right "#[fg=#1e1e2e,bg=default]#[fg=#89b4fa,bg=#1e1e2e,bold] #H 󰇝 #(whoami) "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'sainnhe/tmux-fzf'
set-environment -g TMUX_FZF_LAUNCH_KEY "i"
bind-key o run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
