# "$schema" = 'https://starship.rs/config-schema.json'
#
# Kanagawa Dragon ŌĆö one-line prompt, same language as the eww bar:
# icon+label segments parted by faint Ōöé rules, muted Kanagawa tones, no bold.
# Spacing rule: segments carry no trailing space; every Ōöé has exactly one
# space on each side via the "[ Ōöé ]" separator prefix.

add_newline = true
palette = "kanagawa"

format = """
 $hostname\
$directory\
$git_branch$git_status\
$c$dotnet$golang$java$lua$nodejs$php$python$rust$zig\
$cmd_duration $character"""

right_format = ""

[palettes.kanagawa]
base00 = "#181616" # Main Background
base01 = "#1D1C19" # Elevated Surface
base02 = "#282727" # Selection/Subtle Border
base03 = "#625e5a" # Strong Border / Muted
base05 = "#c5c9c5" # Foreground
base08 = "#8ea4a2" # Aqua
base09 = "#8ba4b0" # Blue
base0a = "#c4746e" # Red/High Status
base0c = "#b6927b" # Orange/Environment
base0d = "#87a987" # Green/Success Status
base0e = "#c4b28a" # Sand/Primary
base0f = "#949fb5" # Teal

# Only shows over ssh ŌĆö quiet orange
[hostname]
ssh_only = true
ssh_symbol = "¾░ŻĆ "
style = "fg:base0c"
format = "[$ssh_symbol$hostname]($style)[ Ōöé ](fg:base03)"

# Location ŌĆö aqua, like the bar's date/info
[directory]
style = "fg:base08"
format = "[’ü╝ $path]($style)[$read_only](fg:base0a)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"

# Git ŌĆö sand primary, semantic status marks
[git_branch]
symbol = "’Éś "
style = "fg:base0e"
format = "[ Ōöé ](fg:base03)[$symbol$branch]($style)"

[git_status]
