# "$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# The "Tree" Style Prompt with a "Pill" Header
# Structure: 
# Ôò¡ÔöÇ¯éÂ[ Languages ¾░çØ Git ¾░çØ Directory ]¯é┤
# Ôò░ÔöÇÔ×£ 

format = """\
[](bold fg:#1e1e2e)\
[ÔûæÔûÆÔûô](fg:#1e1e2e)\
$directory\
$c$csharp$dotnet$golang$java$lua$nodejs$php$python$rust$zig${custom.nix}\
