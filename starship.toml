# "$schema" = 'https://starship.rs/config-schema.json'
#
# Oxocarbon Dark ÔÇö same language as the eww bar/console and rofi:
# icon+label pairs split by ¾░çØ hairline separators, functional color coding
# (cyan = location, purple = git/primary, magenta = environment, pink = error).

add_newline = true
palette = "oxocarbon"

format = """
 $hostname\
$directory\
$git_branch$git_status\
$c$dotnet$golang$java$lua$nodejs$php$python$rust$zig\
$cmd_duration\
$character\
 """

right_format = ""

[palettes.oxocarbon]
base00 = "#161616" # Main Background
base01 = "#262626" # Elevated Surface
base02 = "#393939" # Selection/Subtle Border
base03 = "#525252" # Strong Border / Muted
base05 = "#f2f4f8" # Foreground
base08 = "#3ddbd9" # Cyan
base09 = "#78a9ff" # Blue
base0a = "#ee5396" # Pink/High Status
base0c = "#ff7eb6" # Magenta
base0d = "#42be65" # Green/Success Status
base0e = "#be95ff" # Purple/Primary
base0f = "#82cfff" # Light Blue

# Only shows over ssh ÔÇö magenta, like the bar's network segment
[hostname]
ssh_only = true
ssh_symbol = "¾░úÇ "
