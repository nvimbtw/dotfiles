# "$schema" = 'https://starship.rs/config-schema.json'
#
# Kanagawa Dragon ÔÇö one-line prompt, same language as the eww bar:
# icon+label segments parted by faint Ôöé rules, muted Kanagawa tones, no bold.
# Spacing rule: segments carry no trailing space; every Ôöé has exactly one
# space on each side via the "[ Ôöé ]" separator prefix.

add_newline = true
palette = "kanagawa"

format = """
 $hostname\
${custom.win}${custom.wsl}${custom.arch}\
$directory\
$git_branch$git_status\
$c$dotnet$golang$java$lua$nodejs$php$python$rust$zig\
$cmd_duration $character"""

right_format = ""

[palettes.kanagawa]
base00 = "#181616" # Main Background
base01 = "#1D1C19" # Elevated Surface
base02 = "#282727" # Selection/Subtle Border
base03 = "#625e5a" # Strong Border / Muted
base05 = "#c5c9c5" # Foreground
base08 = "#8ea4a2" # Aqua
base09 = "#8ba4b0" # Blue
base0a = "#c4746e" # Red/High Status
base0c = "#b6927b" # Orange/Environment
base0d = "#87a987" # Green/Success Status
base0e = "#c4b28a" # Sand/Primary
base0f = "#949fb5" # Teal

# Only shows over ssh ÔÇö quiet orange
[hostname]
ssh_only = true
ssh_symbol = "¾░úÇ "
style = "fg:base0c"
format = "[$ssh_symbol$hostname]($style)[ Ôöé ](fg:base03)"

# System ÔÇö which machine am I on: native Arch, WSL, or Windows/PowerShell.
# Only one ever renders; WSL is told apart from native Linux by the
# "microsoft" string the WSL kernel leaves in /proc/version.
[custom.win]
os = "windows"
symbol = "´à║"
style = "fg:base0c"
format = "[$symbol windows]($style)[ Ôöé ](fg:base03)"

[custom.wsl]
os = "linux"
when = "grep -qi microsoft /proc/version"
symbol = "´à║"
style = "fg:base0c"
format = "[$symbol wsl]($style)[ Ôöé ](fg:base03)"

[custom.arch]
os = "linux"
when = "! grep -qi microsoft /proc/version"
symbol = "¾░úç"
style = "fg:base0c"
format = "[$symbol arch]($style)[ Ôöé ](fg:base03)"

# Location ÔÇö aqua, like the bar's date/info
[directory]
style = "fg:base08"
format = "[´ü╝ $path]($style)[$read_only](fg:base0a)"
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥"

# Git ÔÇö sand primary, semantic status marks
[git_branch]
symbol = "´Éÿ "
style = "fg:base0e"
format = "[ Ôöé ](fg:base03)[$symbol$branch]($style)"

[git_status]
format = "$all_status"
conflicted = " [´ü▒](fg:base0a)"
ahead = " [Ôçí](fg:base08)"
behind = " [Ôçú](fg:base08)"
diverged = " [Ôçò](fg:base08)"
untracked = " [¾▒¬×](fg:base0c)"
stashed = " [´Æç](fg:base0d)"
modified = " [´æê](fg:base0c)"
staged = " [´ÆÉ](fg:base0d)"
renamed = " [¯¬£](fg:base0d)"
deleted = " [¯¬ü](fg:base0a)"

[cmd_duration]
min_time = 2000
style = "fg:base03"
format = "[ Ôöé ](fg:base03)[¾▒½æ $duration]($style)"

# The prompt ÔÇö teal when ready, red on error
[character]
success_symbol = "[¾░ö░](fg:base0f)"
error_symbol = "[¾░ö░](fg:base0a)"

# Languages ÔÇö orange, like the bar's environment info
[c]
symbol = "¯ÿ× "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[dotnet]
symbol = "¯×▓ "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[golang]
symbol = "¾░ƒô "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[java]
symbol = "¯ëû "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[lua]
symbol = "¯ÿá "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[nodejs]
symbol = "¾░ÄÖ "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[php]
symbol = "¯ÿê "
style = "fg:base0c"
format = "[ Ôöé ](fg:base03)[$symbol($version)]($style)"
[python]
