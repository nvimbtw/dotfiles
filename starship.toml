style = "fg:base03"
format = "[ Ōöé ](fg:base03)[¾▒½æ $duration]($style)"

# The prompt ŌĆö teal when ready, red on error
[character]
success_symbol = "[¾░ö░](fg:base0f)"
error_symbol = "[¾░ö░](fg:base0a)"

