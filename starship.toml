# "$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
 $directory\
$git_branch$git_status\
$c$csharp$dotnet$golang$java$lua$nodejs$php$python$rust$zig$character\
 """

# No right format (removed time and arch logo)
right_format = ""

[directory]
style = "bold fg:#3ddbd9"
format = "[ $path]($style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾 "

[git_branch]
symbol = " "
style = "bold fg:#be95ff"
format = "[󰇝 ](fg:#525252)[$symbol$branch]($style) "

[git_status]
format = "$all_status"
conflicted = "[ ](fg:#ee5396)"
ahead = "[⇡ ](fg:#3ddbd9)"
behind = "[⇣ ](fg:#3ddbd9)"
diverged = "[⇕ ](fg:#3ddbd9)"
untracked = "[󱪞 ](fg:#ff7eb6)"
stashed = "[ ](fg:#42be65)"
modified = "[ ](fg:#ff7eb6)"
staged = "[ ](fg:#42be65)"
renamed = "[ ](fg:#42be65)"
deleted = "[ ](fg:#ee5396)"

[cmd_duration]
min_time = 2000
style = "bold fg:#525252"
format = "[󰇝 $duration]($style) "

[character]
success_symbol = "[󰔰](bold fg:#82cfff)"
error_symbol = "[󰔰](bold fg:#82cfff)"

[c]
symbol = " "
style = "bold fg:#ff7eb6"
format = "[󰇝 ](fg:#525252)[$symbol($version)]($style) "

[dotnet]
symbol = " "
style = "bold fg:#ff7eb6"
format = "[󰇝 ](fg:#525252)[$symbol($version)]($style) "

[golang]
symbol = "󰟓 "
style = "bold fg:#ff7eb6"
format = "[󰇝 ](fg:#525252)[$symbol($version)]($style) "

[java]
symbol = " "
style = "bold fg:#ff7eb6"
format = "[󰇝 ](fg:#525252)[$symbol($version)]($style) "

[lua]
symbol = " "
style = "bold fg:#ff7eb6"
format = "[󰇝 ](fg:#525252)[$symbol($version)]($style) "

[nodejs]
