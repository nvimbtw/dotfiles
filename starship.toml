# Move time/cmd duration to the right
right_format = "$cmd_duration$time"

# --- Core Styles ---
# We use a unified "Pill" style: Blue background (#89b4fa), Dark text (#11111b).

[directory]
style = "bold bg:#1e1e2e fg:#89b4fa"
format = "[ ´ü╝ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥ "

[git_branch]
symbol = "´Éÿ "
style = "bold bg:#1e1e2e fg:#89b4fa"
format = "[¾░çØ $symbol$branch ]($style)"

[git_status]
style = "bold bg:#1e1e2e fg:#89b4fa"
format = "[$all_status]($style)"
conflicted = "´ü▒"
ahead = "Ôçí "
behind = "Ôçú "
diverged = "Ôçò "
untracked = "¾▒¬× "
stashed = "´Æç "
modified = "´æê "
staged = "´ÆÉ "
renamed = "¯¬£ "
deleted = "¯¬ü "

[cmd_duration]
min_time = 2000
style = "bold fg:#fab387"
format = " [$duration]($style)"

[time]
disabled = false
style = "bold fg:#b4befe"
format = " [$time]($style)[ ´îô ](bold fg:#89b4fa)"

