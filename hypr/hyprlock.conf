# Hyprlock — Asymmetric Terminal Aesthetic
# Oxocarbon Dark, same language as the eww bar/console:
# flat #161616 surfaces, 1px #393939 hairlines, 󰇝 separators,
# functional colors (purple clock/primary, cyan date, blue battery, pink fail)
# Resolution: 2560x1600

general {
    hide_cursor = true
    fail_timeout = 2000
    no_fade_in = false
}

# --- Background ---
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    contrast = 1.0
    brightness = 0.5
}

# Dark Overlay (base00)
shape {
    monitor =
    size = 2560, 1600
    color = rgba(22, 22, 22, 0.4)
    zindex = -2
    halign = center
    valign = center
}

# --- Layout Elements ---

# Top Bar background (base00, like .container-box)
shape {
    monitor =
    size = 100%, 48
    color = rgba(22, 22, 22, 1.0)
    zindex = -1
    halign = center
    valign = top
}

# Top Bar bottom hairline (base02)
shape {
    monitor =
    size = 100%, 1
    color = rgba(57, 57, 57, 1.0)
    zindex = -1
    position = 0, -48
    halign = center
    valign = top
}

# Vertical Divider (base02 hairline, fixed 20% position: 512px)
shape {
    monitor =
    size = 1, 1600
    color = rgba(57, 57, 57, 1.0)
    zindex = -1
    position = 512, 0
    halign = left
    valign = center
}

# --- Top Bar Content (mirrors the eww mainBar) ---

# Clock (purple, like .clock)
label {
    monitor =
    text = 󱑋 $TIME
    color = rgba(190, 149, 255, 1.0)
    font_size = 16
    font_family = MonaspiceNe Nerd Font
    position = 30, -12
    halign = left
    valign = top
}

# Separator
label {
    monitor =
    text = 󰇝
    color = rgba(82, 82, 82, 1.0)
    font_size = 14
    font_family = MonaspiceNe Nerd Font
    position = 150, -13
    halign = left
    valign = top
}

# Date (cyan, like .date)
label {
    monitor =
    text = cmd[update:60000] echo " $(date +"%-d. %b")"
    color = rgba(61, 219, 217, 1.0)
    font_size = 16
    font_family = MonaspiceNe Nerd Font
    position = 180, -12
    halign = left
    valign = top
}

# Battery (blue, like .battery-normal)
label {
    monitor =
    text = cmd[update:10000] echo "$($HOME/.config/hypr/scripts/battery_hyprlock.sh)"
    color = rgba(120, 169, 255, 1.0)
    font_size = 16
    font_family = MonaspiceNe Nerd Font
    position = -30, -12
    halign = right
    valign = top
}

# Separator
label {
    monitor =
    text = 󰇝
    color = rgba(82, 82, 82, 1.0)
    font_size = 14
    font_family = MonaspiceNe Nerd Font
    position = -150, -13
    halign = right
    valign = top
}

# Keyboard layout (purple, like .keyboard)
label {
    monitor =
    text = 󰌌 $LAYOUT
    color = rgba(190, 149, 255, 1.0)
    font_size = 16
    font_family = MonaspiceNe Nerd Font
    position = -180, -12
    halign = right
    valign = top
}

# --- Left Column: Ghost Time ---
# Centered between 0 and 512 (Midpoint = 256)
# Offset from screen center (1280): 256 - 1280 = -1024
label {
    monitor =
    text = $TIME
    color = rgba(242, 244, 248, 0.1)
    font_size = 350
    font_family = MonaspiceNe Nerd Font Bold
    rotate = 90
    position = -1024, 0
    halign = center
    valign = center
}

# --- Right Column: Content ---

# Top Right Date (cyan, muted)
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A" | tr '[:lower:]' '[:upper:]' | sed 's/./& /g')"
    color = rgba(61, 219, 217, 0.8)
    font_size = 20
    font_family = MonaspiceNe Nerd Font
    position = -100, -120
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%d %b %Y" | tr '[:lower:]' '[:upper:]' | sed 's/./& /g')"
    color = rgba(82, 82, 82, 1.0)
    font_size = 18
    font_family = MonaspiceNe Nerd Font
    position = -100, -165
    halign = right
    valign = top
}

# Center: Username (Centered in Right Column)
# Right column: 512 to 2560. Midpoint = 1536
# Offset from screen center (1280): 1536 - 1280 = 256
label {
    monitor =
    text = $USER@arch
    color = rgba(242, 244, 248, 0.7)
    font_size = 24
    font_family = MonaspiceNe Nerd Font
    position = 256, 100
    halign = center
    valign = center
}

# Center: Shell Prompt Label (starship character, base0F)
# Left of Input box (1536 - 225 - 40 = 1271)
# Offset from screen center (1280): 1271 - 1280 = -9
label {
    monitor =
    text = 󰔰
    color = rgba(130, 207, 255, 1.0)
    font_size = 24
    font_family = MonaspiceNe Nerd Font
    position = -9, 0
    halign = center
    valign = center
}

# Input Field (Centered in Right Column)
# base00 surface, base02 hairline, purple check, pink fail
input-field {
    monitor =
    size = 450, 60
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = false
    inner_color = rgba(22, 22, 22, 1.0)
    outer_color = rgba(57, 57, 57, 1.0)
    font_color = rgba(242, 244, 248, 1.0)
    fade_on_empty = false
    rounding = 0
    placeholder_text =
    hide_input = false
    check_color = rgba(190, 149, 255, 1.0)
    fail_color = rgba(238, 83, 150, 1.0)
    position = 256, 0
    halign = center
    valign = center
}

# Bottom Left of Right Column: LOCKED (muted, like .muted-label)
label {
    monitor =
    text = L O C K E D
    color = rgba(82, 82, 82, 1.0)
    font_size = 14
    font_family = MonaspiceNe Nerd Font
    position = 572, 130
    halign = left
    valign = bottom
}

# Bottom Left of Right Column: accent hairline (purple primary)
shape {
    monitor =
    size = 120, 1
    color = rgba(190, 149, 255, 1.0)
    position = 572, 110
    halign = left
    valign = bottom
}
