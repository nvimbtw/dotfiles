# Hyprlock — Kanagawa Dragon, editorial minimal.
# Blurred wallpaper under a warm-dark wash, a centered time + muted date,
# and a single lightly-rounded input. Muted ink, sand as the only accent.
# Resolution: 2560x1600

general {
    hide_cursor = true
    fail_timeout = 2000
    no_fade_in = false
}

# --- Background ---
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    contrast = 1.0
    brightness = 0.5
}

# base00 warm-dark wash
shape {
    monitor =
    size = 2560, 1600
    color = rgba(24, 22, 22, 0.45)
    zindex = -2
    halign = center
    valign = center
}

# --- Centered stack: time, date, input ---

# Time — foreground, the one large element
label {
    monitor =
    text = $TIME
    color = rgba(197, 201, 197, 1.0)
    font_size = 130
    font_family = MonaspiceNe Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# Date — small, muted
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %-d %B")"
    color = rgba(98, 94, 90, 1.0)
    font_size = 18
    font_family = MonaspiceNe Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

# Input — base01 fill, base02 hairline, sand check, red fail, lightly rounded
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    inner_color = rgba(29, 28, 25, 1.0)
    outer_color = rgba(40, 39, 39, 1.0)
    font_color = rgba(197, 201, 197, 1.0)
    fade_on_empty = false
    rounding = 8
    placeholder_text =
    hide_input = false
    check_color = rgba(196, 178, 138, 1.0)
    fail_color = rgba(196, 116, 110, 1.0)
    position = 0, -90
    halign = center
    valign = center
}
