# --- Content ---

label {
    monitor =
    text = cmd[update:86400000] cat ~/.config/hypr/scripts/ascii_art.txt
    font_size = 24
    font_family = Monaspace Krypton Var
    color = rgb(137, 180, 250)
    position = 0, 200
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] echo -e "<b>> STATUS............. [ <span foreground='##a6e3a1'>ACTIVE</span> ]</b>\n<b>> IDENTITY........... [ <span foreground='##cba6f7'>$USER</span> ]</b>\n<b>> POWER.............. [ <span foreground='##f9e2af'>$($HOME/.config/hypr/scripts/battery_hyprlock.sh | awk '{print $NF}')</span> ]</b>\n<b>> REGION............. [ <span foreground='##89b4fa'>$LAYOUT</span> ]</b>\n<b>> TIMESTAMP.......... [ <span foreground='##fab387'>$TIME</span> ]</b>"
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgb(166, 173, 200)
    position = 0, -50
    halign = center
    valign = center
    text_align = left
    zindex = 2
}

# --- Input Area ---

label {
    monitor =
    text = <span foreground='##a6e3a1'>x_x@nixos</span>:<span foreground='##89b4fa'>~</span>$ 
    font_size = 22
    font_family = JetBrainsMono Nerd Font Bold
    color = rgb(205, 214, 244)
    position = -220, -280
    halign = center
    valign = center
    zindex = 2
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = false
    dots_rounding = -1 
    inner_color = rgba(0, 0, 0, 0) 
    outer_color = rgba(0, 0, 0, 0) 
    check_color = rgba(0, 0, 0, 0)
    fail_color = rgba(0, 0, 0, 0) 
    font_color = rgb(166, 227, 161)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = false
    placeholder_text = 
    position = 30, -280
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = $PAMFAIL
    color = rgb(243, 139, 168)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -350
    halign = center
    valign = center
    zindex = 2
}
