general {
    hide_cursor = true
    fail_timeout = 2000
    no_fade_in = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = fadeEase, 0.65, 0, 0.35, 1
    animation = fade, 1, 2, fadeEase
    animation = inputFieldColors, 1, 2, fadeEase
}

# --- Pure Oxocarbon Background ---
background {
    monitor =
    color = rgb(22, 22, 22)
}

# --- LOCKED Indicator (Top-Right) ---
label {
    monitor =
    text = 󰍁 LOCKED
    color = rgb(255, 126, 182)
    font_size = 14
    font_family = MonaspiceNe Nerd Font bold
    position = -30, 30
    halign = right
    valign = top
}

# --- Card Background ---
shape {
    monitor =
    size = 400, 380
    color = rgb(22, 22, 22)
    border_size = 2
    border_color = rgb(82, 82, 82)
    rounding = 8
    position = 0, 0
    halign = center
    valign = center
}

# --- Clock ---
label {
    monitor =
    text = $TIME
    color = rgb(242, 244, 248)
    font_size = 72
    font_family = MonaspiceNe Nerd Font bold
    position = 0, -60
    halign = center
    valign = center
}

# --- Separator Line ---
shape {
    monitor =
    size = 200, 2
    color = rgb(82, 82, 82)
    rounding = 1
    position = 0, 10
    halign = center
    valign = center
}

# --- Date ---
label {
    monitor =
    text = cmd[update:60000] date "+%A, %B %d"
    color = rgb(61, 219, 217)
    font_size = 18
    font_family = MonaspiceNe Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    inner_color = rgb(38, 38, 38)
    outer_color = rgb(190, 149, 255)
    font_color = rgb(242, 244, 248)
    font_family = MonaspiceNe Nerd Font
    fade_on_empty = false
    rounding = 4
    placeholder_text =
    fail_color = rgb(238, 83, 150)
    check_color = rgb(61, 219, 217)
    position = 0, 110
    halign = center
    valign = center
}