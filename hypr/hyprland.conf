env = GTK_THEME,Adwaita-dark

################
### MONITORS ###
################
monitor=eDP-1, 2560x1600@60, 0x0, 2
monitor=HDMI-A-1, highrr, 1280x0, 1, mirror, eDP-1


###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = dolphin
$rofiDrun = rofi -show drun
$rofiWindow = rofi -show window
$rofiRun = rofi -show run


#################
### AUTOSTART ###
#################
# Apps
exec-once = vesktop
# exec-once = spotify
exec-once = mpd
exec-once = $terminal
# exec-once = gammastep

# Background
exec-once = hypridle
exec-once = awww-daemon
exec-once = awww img ~/Downloads/wallhaven-od78y5.jpg
exec-once = eww daemon
exec-once = eww open mainBar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = rfkill block bluetooth


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 1
    gaps_out = 1
    border_size = 1
    col.active_border = 0xFF525252
    col.inactive_border = 0x33262626
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 1
    rounding_power = 1
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
    }
    blur {
        enabled = true
        size = 4
        passes = 3
        vibrancy = 0.1696
        # vibrancy = 0.5
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 1, easeOutQuint
    animation = windows, 1, 1, easeOutQuint
    animation = windowsIn, 1, 1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 0.8, linear, popin 87%
    animation = fadeIn, 1, 0.8, almostLinear
    animation = fadeOut, 1, 0.7, almostLinear
    animation = fade, 1, 1, quick
    animation = layers, 1, 1.5, easeOutQuint
    animation = layersIn, 1, 1.5, easeOutQuint, fade
    animation = layersOut, 1, 0.8, linear, fade
    animation = fadeLayersIn, 1, 0.8, almostLinear
    animation = fadeLayersOut, 1, 0.7, almostLinear
    animation = workspaces, 1, 0.8, almostLinear, fade
    animation = workspacesIn, 1, 0.6, almostLinear, fade
    animation = workspacesOut, 1, 0.8, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    # NEVER CHANGE THIS. 
    force_default_wallpaper = 1
    disable_hyprland_logo = true

    # Optimization
    vfr = true
    disable_autoreload = true
}


#############
### INPUT ###
#############
input {
    kb_layout = us,si
    kb_variant =
    kb_model =
    kb_options = caps:swapescape,grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.25
    }

    repeat_rate = 50
    repeat_delay = 200
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
$mainMod = alt

bind = , Print, exec, hyprshot -m output -m eDP-1
bind = $mainMod, Print, exec, hyprshot -m region

bind = $mainMod, Space, submap, rofi

submap = rofi
bind = , D, exec, $rofiDrun
bind = , D, submap, reset
bind = , W, exec, $rofiWindow
bind = , W, submap, reset
bind = , R, exec, $rofiRun
bind = , R, submap, reset
bind = , P, exec, ~/.config/rofi/scripts/bitwarden.sh
bind = , P, submap, reset
bind = , S, exec, ~/.config/rofi/scripts/systemControl.sh
bind = , S, submap, reset
bind = , G, exec, ~/.config/rofi/scripts/web-search.sh
bind = , G, submap, reset
bind = , K, exec, ~/.config/rofi/scripts/calc.sh
bind = , K, submap, reset
bind = , T, exec, ~/.config/rofi/scripts/tasks.sh
bind = , T, submap, reset
bind = , C, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = , C, submap, reset
bind = , B, exec, ~/.config/rofi/scripts/bluetooth.sh
bind = , B, submap, reset
bind = , N, exec, ~/.config/rofi/scripts/network-switcher.sh
bind = , N, submap, reset
bind = , escape, submap, reset
submap = reset

bind = $mainMod, W, exec, cliphist wipe 

bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, B, exec, chromium
bind = $mainMod, R, exec, eww reload
bind = $mainMod, C, exec, eww open console
bind = $mainMod SHIFT, C, exec, eww close console
bind = $mainMod, Y, exec, hyprlock
bind = $mainMod, F, exec, /home/x_x/Downloads/organize_downloads.sh

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-


##############################
### WINDOWS AND WORKSPACES ###
##############################
workspace = 1,  monitor:eDP-1,    persistent:true
workspace = 2,  monitor:eDP-1,    persistent:true
workspace = 3,  monitor:eDP-1,    persistent:true
workspace = 4,  monitor:eDP-1,    persistent:true
workspace = 5,  monitor:eDP-1,    persistent:true
workspace = 6,  monitor:HDMI-A-1, persistent:false
workspace = 7,  monitor:HDMI-A-1, persistent:false
workspace = 8,  monitor:HDMI-A-1, persistent:false
workspace = 9,  monitor:HDMI-A-1, persistent:false
workspace = 10, monitor:HDMI-A-1, persistent:false

windowrule = workspace 5 silent, match:class vesktop
